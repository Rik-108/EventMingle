<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventMingle - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        .bg-custom {
            background-image: url('/static/images/background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }
    </style>
</head>
<body class="bg-custom flex items-center justify-center">
    <div class="bg-white bg-opacity-90 p-8 rounded-lg shadow-lg text-center max-w-md">

        <p class="text-gray-600 mb-6">Connect, celebrate, and create unforgettable events with us!</p>
        <div class="space-x-4">
            <a href="/login" class="bg-blue-600 text-white px-6 py-3 rounded-full hover:bg-blue-700 transition duration-300">Log In</a>
            <a href="/create_profile" class="bg-green-600 text-white px-6 py-3 rounded-full hover:bg-green-700 transition duration-300">Create Profile</a>
        </div>
    </div>
