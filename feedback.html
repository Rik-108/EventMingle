<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EventMingle - Submit Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="bg-cover bg-center min-h-screen flex items-center justify-center" style="background-image: url('/static/images/background.png');">
    <div class="bg-white bg-opacity-80 p-8 rounded-lg shadow-lg w-full max-w-md fade-in">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Submit Feedback</h2>
        <!-- Updated: Ensured error message div for validation -->
        <div id="error-message" class="hidden"></div>
        <!-- Updated: Verified form action and redirect behavior -->
        <form method="POST" action="/feedback/{{ event_id }}" id="feedback-form">
            <div class="mb-4">
                <label class="block text-gray-700 mb-2" for="feedback">Feedback</label>
                <textarea name="feedback" id="feedback" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" rows="5" required></textarea>
            </div>
            <button type="submit" class="feedback-button w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Submit Feedback</button>
        </form>
        <p class="mt-4 text-center"><a href="/attendee_dashboard" class="text-blue-500 hover:underline">Back to Dashboard</a></p>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
